<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - Hermanamiento 2026</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1B4965 0%, #E8A537 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
      padding: 1rem;
    }

    .offline-container {
      background: white;
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      background: #f5f5f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      font-size: 28px;
      margin-bottom: 1rem;
      color: #1B4965;
      font-weight: 700;
    }

    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .retry-button {
      background: #1B4965;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .retry-button:hover {
      background: #0d2438;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(27, 73, 101, 0.4);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .cached-pages {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #eee;
    }

    .cached-pages h2 {
      font-size: 18px;
      margin-bottom: 1rem;
      color: #1B4965;
    }

    .page-list {
      list-style: none;
      text-align: left;
    }

    .page-list li {
      margin: 0.5rem 0;
    }

    .page-list a {
      color: #E8A537;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      display: inline-block;
      padding: 0.5rem;
    }

    .page-list a:hover {
      color: #1B4965;
      text-decoration: underline;
      transform: translateX(5px);
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      font-size: 14px;
      color: #999;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ccc;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-dot.online {
      background-color: #27AE60;
      animation: none;
    }

    @media (max-width: 600px) {
      .offline-container {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 24px;
      }

      .offline-icon {
        width: 100px;
        height: 100px;
        font-size: 52px;
      }

      p {
        font-size: 14px;
      }

      .retry-button {
        padding: 12px 24px;
        font-size: 14px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>
      No pudimos conectarnos al servidor. Por favor, verifica tu conexión a internet 
      e intenta nuevamente.
    </p>
    <button class="retry-button">
      Reintentar conexión
    </button>

    <div class="cached-pages">
      <h2>📚 Contenido disponible offline</h2>
      <ul class="page-list">
        <li><a href="./">🏠 Página principal</a></li>
        <li><a href="pages/evento.html">📅 Evento</a></li>
        <li><a href="pages/galeria.html">🖼️ Galería</a></li>
        <li><a href="pages/ciudades.html">🌍 Ciudades</a></li>
      </ul>
    </div>

    <div class="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Desconectado</span>
    </div>
  </div>

  <script>
    // Botón de reintento
    document.querySelector('.retry-button').addEventListener('click', () => {
      window.location.reload();
    });

    // Update status indicator
    function updateStatus() {
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      if (navigator.onLine) {
        statusDot.classList.add('online');
        statusText.textContent = 'Conectado - recargando...';
        statusDot.style.animation = 'none';
        // Auto-reload when connection restored
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        statusDot.classList.remove('online');
        statusText.textContent = 'Desconectado';
      }
    }

    // Listen for online/offline events
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    // Check connection every 3 seconds
    setInterval(() => {
      if (navigator.onLine) {
        updateStatus();
      }
    }, 3000);

    // Initial status check
    updateStatus();

    // Service Worker registration for offline functionality
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(err => {
        console.log('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
